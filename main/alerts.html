<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas de Stock — StockEasy</title>
    <!-- Conectores de Estilo -->
    <link rel="stylesheet" href="../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="screen active" id="scr-app">
      <div class="app-layout">
        <div class="sidebar">
          <div class="sb-brand">
            <div class="sb-brand-ico"><svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.4L18.5 8 12 11.6 5.5 8 12 4.4zM4.5 9.3L11 12.8v6.9l-6.5-3.6V9.3zm8 10.4v-6.9l6.5-3.5v6.9L12.5 19.7z"/></svg></div>
            <div class="sb-brand-name">Stock<span>Easy</span></div>
          </div>
          <div class="sb-nav">
            <div class="sb-sec">Principal</div>
            <div class="sb-item" onclick="window.location.href='dashboard.html'">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>Dashboard
            </div>
            <div class="sb-sec">Gestión</div>
            <div class="sb-item" onclick="window.location.href='products.html'">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.58 15.91.48 13.33.54 11.36.07 9.5 1.99 9.5 4.5H7c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h13c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-5-2c.83 0 1.5.67 1.5 1.5S15.83 7 15 7s-1.5-.67-1.5-1.5S14.17 4 15 4zm2 16H8V9h2v1c0 .55.45 1 1 1s1-.45 1-1V9h2v1c0 .55.45 1 1 1s1-.45 1-1V9h2v11z"/></svg>Productos
            </div>
            <div class="sb-item" onclick="window.location.href='inventory.html'">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>Inventario
            </div>
            <div class="sb-item active" onclick="window.location.href='alerts.html'">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>Alertas
              <span class="sb-badge" id="alert-badge">2</span>
            </div>
            <div class="sb-sec">Cuenta</div>
            <div class="sb-item" onclick="window.location.href='profile.html'">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Mi perfil
            </div>
          </div>
          <div class="sb-user">
            <div class="sb-user-row">
              <div class="sb-av" id="sb-av">MC</div>
              <div><div class="sb-uname" id="sb-nm">María Cardona</div><div class="sb-ubiz" id="sb-bz">Tienda La Esperanza</div></div>
            </div>
            <div class="sb-btns">
              <button class="sb-btn" onclick="doLogout()">↩ Salir</button>
            </div>
          </div>
        </div>
        <div class="main">
          <div class="page active" id="pg-alerts">
        <div id="alerts-list"></div>
        <div class="sc" style="margin-top:16px">
          <div class="sc-title">Configurar límite mínimo de stock</div>
          <div class="fg2">
            <div class="fl">
              <label>Producto</label>
              <select id="alert-prod-sel"><option value="">Seleccionar producto</option></select>
            </div>
            <div class="fl">
              <label>Límite mínimo de stock</label>
              <input type="number" id="alert-min-val" placeholder="Ej: 10" min="1">
            </div>
          </div>
          <button class="btn-add" style="margin-top:4px" onclick="guardarLimite()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
            Guardar límite
          </button>
        </div>
      </div>

      <div id="toast"></div>

    <!-- CONECTORES JAVASCRIPT (Orden Crítico) -->
    <!-- 1. Datos globales y persistencia -->
    <script src="../js/config/main.js"></script>
    <!-- 2. Lógica de productos e inventario -->
    <script src="../js/inventory/products.js"></script>
    <script src="../js/inventory/alerts.js"></script>
    <!-- 3. Perfil de usuario y sidebar -->
    <script src="../js/dashboard/dashboard.js"></script>
    <script src="../js/toast/toast.js"></script>

      </div>
    </div>
  </div>
</body>
</html>
