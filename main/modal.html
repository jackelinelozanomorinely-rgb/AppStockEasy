<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal — StockEasy</title>
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="modal-overlay" id="mo-product">
  <div class="modal">
    <div class="modal-title">
      <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--b1)"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.58 15.91.48 13.33.54 11.36.07 9.5 1.99 9.5 4.5H7c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h13c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-5-2c.83 0 1.5.67 1.5 1.5S15.83 7 15 7s-1.5-.67-1.5-1.5S14.17 4 15 4zm2 16H8V9h2v1c0 .55.45 1 1 1s1-.45 1-1V9h2v1c0 .55.45 1 1 1s1-.45 1-1V9h2v11z"/></svg>
      <span id="mo-prod-ttl">Agregar producto</span>
    </div>
    <div class="fl"><label>Nombre del producto *</label><input type="text" id="mp-name" placeholder="Nombre del producto"><div class="err-msg" id="mp-name-err">Campo obligatorio</div></div>
    <div class="fl"><label>Descripción *</label><input type="text" id="mp-desc" placeholder="Descripción del producto"><div class="err-msg" id="mp-desc-err">Campo obligatorio</div></div>
    <div class="fg2">
      <div class="fl"><label>Cantidad inicial *</label>
        <div class="qty-wrap">
          <button class="qty-btn" type="button" onclick="changeQty('mp-qty',-1)">−</button>
          <input type="number" class="qty-input" id="mp-qty" value="1" min="0">
          <button class="qty-btn" type="button" onclick="changeQty('mp-qty',1)">+</button>
        </div>
        <div class="err-msg" id="mp-qty-err">Cantidad inválida</div>
      </div>
      <div class="fl"><label>Precio *</label><input type="text" id="mp-price" placeholder="Ej: 15000"><div class="err-msg" id="mp-price-err">Precio inválido</div></div>
    </div>
    <div class="fl"><label>Límite mínimo de stock</label><input type="number" id="mp-min" placeholder="Ej: 10" min="1" value="10"></div>
    <input type="hidden" id="mp-editing">
    <div class="modal-actions">
      <button class="m-cancel" onclick="closeModal('mo-product')">Cancelar</button>
      <button class="m-save" onclick="saveProd()">Guardar producto</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: CONFIRMAR ELIMINAR ══ -->
<div class="modal-overlay confirm-modal" id="mo-confirm">
  <div class="modal">
    <div class="confirm-icon">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
    </div>
    <div style="font-size:15px;font-weight:700;margin-bottom:8px">¿Eliminar producto?</div>
    <div class="confirm-msg">¿Estás seguro que quieres eliminar "<b id="confirm-prod-name"></b>"? Esta acción no se puede deshacer.</div>
    <div class="modal-actions">
      <button class="m-cancel" onclick="closeModal('mo-confirm')">Cancelar</button>
      <button class="m-confirm-del" onclick="confirmarEliminar()">Sí, eliminar</button>
    </div>
  </div>
</div>

<div id="toast"></div>
    <!-- SCRIPTS: Importante el orden -->
    <!-- 1. El archivo principal con los datos de usuarios -->
    <script src="../js/config/main.js"></script>
    <!-- 2. Lógica de modal y utilidades -->
    <script src="../js/modales/modal.js"></script>
    <script src="../js/toast/toast.js"></script>
</body>
</html>
